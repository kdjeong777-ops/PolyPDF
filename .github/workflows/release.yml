name: Release (build Windows exe)

# 버전 태그(v1.88.0 등)를 push 하면 Windows 빌드 → zip → GitHub Release 에 자동 업로드.
#   git tag v1.88.0 && git push origin v1.88.0
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:          # 수동 실행도 허용

permissions:
  contents: write             # Release 생성/업로드 권한

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      # --- 선택: 전체 기능(OCR/녹화)용 바이너리 동봉. 실패해도 핵심 뷰어는 빌드됨 ---
      - name: Stage ffmpeg (recording) — optional
        continue-on-error: true
        run: |
          choco install ffmpeg -y --no-progress
          $ff = (Get-Command ffmpeg -ErrorAction SilentlyContinue).Source
          if ($ff) { Copy-Item $ff ".\ffmpeg.exe" -Force; echo "ffmpeg staged" }

      - name: Stage Tesseract (OCR) — optional
        continue-on-error: true
        run: |
          choco install tesseract -y --no-progress
          $dir = "C:\Program Files\Tesseract-OCR"
          if (Test-Path "$dir\tesseract.exe") {
            New-Item -ItemType Directory -Force ".\tesseract" | Out-Null
            Copy-Item "$dir\*" ".\tesseract" -Recurse -Force
            echo "tesseract staged"
          }

      - name: Stage NLTK WordNet (vocab) — optional
        continue-on-error: true
        run: python -m nltk.downloader -d nltk_data wordnet omw-1.4

      - name: Build (PyInstaller via build_ci.bat)
        run: cmd /c build_ci.bat

      - name: Package zips (full + update)
        id: pkg
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "dev" }
          $full = "PolyPDF-$tag-win64.zip"
          Compress-Archive -Path "dist\PolyPDF\*" -DestinationPath $full -Force
          # 260618-14: 업데이트용 zip — 안 바뀌는 무거운 부분 제외(앱이 우선 사용, 기존 설치분 보존)
          $stage = "$env:TEMP\polypdf_upd"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          Copy-Item "dist\PolyPDF" $stage -Recurse
          foreach ($p in @("ffmpeg.exe","tesseract","kiwipiepy_model","nltk_data")) {
            $t = Join-Path "$stage\_internal" $p
            if (Test-Path $t) { Remove-Item $t -Recurse -Force }
          }
          $upd = "PolyPDF-$tag-win64-update.zip"
          Compress-Archive -Path "$stage\*" -DestinationPath $upd -Force
          echo "full=$full" >> $env:GITHUB_OUTPUT
          echo "upd=$upd" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: PolyPDF-${{ github.ref_name }}
          path: |
            ${{ steps.pkg.outputs.full }}
            ${{ steps.pkg.outputs.upd }}

      - name: Create or update GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $full = "${{ steps.pkg.outputs.full }}"
          $upd  = "${{ steps.pkg.outputs.upd }}"
          # 이미 릴리스가 있으면(수동으로 좋은 번들 자산 업로드한 경우) CI 가 덮어쓰지 않음 —
          # 없는 자산만 보충 시도하고 항상 성공 종료(수동 자산 보존). 없으면 새로 생성.
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $full $upd 2>$null
            exit 0
          } else {
            gh release create $tag $full $upd --title "PolyPDF $tag" --generate-notes
          }
